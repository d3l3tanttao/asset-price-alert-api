name: Tests

on:
  push:
    branches:
      - main
      - master
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Asset Price Alert API/Asset Price Alert API

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: asset_price_alert
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5433:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d asset_price_alert"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      APP_ENV: test
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@localhost:5433/asset_price_alert
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET_KEY: test-secret-key
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Show repository root
        run: |
          pwd
          ls -la
        working-directory: .

      - name: Show project directory
        run: |
          pwd
          ls -la

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run database migrations
        run: |
          python -m alembic -c alembic.ini upgrade head

      - name: Run tests
        run: |
          python -m pytest