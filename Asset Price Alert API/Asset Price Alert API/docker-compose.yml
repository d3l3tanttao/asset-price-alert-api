services:
  db:
    image: postgres:16
    container_name: asset_price_alert_db
    restart: always
    environment:
      POSTGRES_DB: asset_price_alert
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: asset_price_alert_redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data: